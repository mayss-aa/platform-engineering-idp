spring.application.name=idp-platform
spring.datasource.url=jdbc:postgresql://localhost:5432/idp_platform
spring.datasource.username=postgres
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080
#############################################
# Terraform Configuration
#############################################

terraform.enabled=true

terraform.binary-path=terraform

terraform.working-directory=E:/DevOps-Stage/terraform/environments/dev

terraform.timeout=300