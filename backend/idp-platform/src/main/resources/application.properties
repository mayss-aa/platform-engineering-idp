spring.application.name=idp-platform

#############################################
# Database Configuration
#############################################

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/idp_platform}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}

#############################################
# JPA / Hibernate
#############################################

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

#############################################
# Server Configuration
#############################################

server.port=8080

#############################################
# Terraform Configuration
#############################################

terraform.enabled=true

terraform.binary-path=${TERRAFORM_BINARY_PATH:terraform}

terraform.working-directory=${TERRAFORM_WORKING_DIRECTORY:E:/DevOps-Stage/terraform/environments/dev}

terraform.timeout=300