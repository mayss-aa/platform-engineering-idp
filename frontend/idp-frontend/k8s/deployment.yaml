apiVersion: apps/v1
kind: Deployment
metadata:
  name: idp-frontend
  namespace: idp-platform
  labels:
    app: idp-frontend
    version: "1.0.0"
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: idp-frontend
  template:
    metadata:
      labels:
        app: idp-frontend
        version: "1.0.0"
        component: frontend
    spec:
      containers:
        - name: idp-frontend
          image: idp-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: idp-frontend-nginx-config
      terminationGracePeriodSeconds: 30
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
