name: Continuous Integration

on:
  push:
    branches:
      - main
      - "feature/**"

  pull_request:
    branches:
      - main

jobs:

  build:

    name: Java Build

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/idp-platform

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Project
        run: mvn clean package -DskipTests