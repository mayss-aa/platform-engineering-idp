apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: idp-frontend
  namespace: idp-platform
  labels:
    app: idp-frontend
    component: frontend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: idp-frontend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
